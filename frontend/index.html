<!DOCTYPE html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <link rel="icon" type="image/svg+xml" href="/vite.svg" />

    <title>GALERIE · a home for living code</title>
    <script>
      // Handle deep links from email clients
      (function() {
        // Check if this is an auth callback with hash
        if (window.location.hash && window.location.hash.includes('access_token')) {
          console.log('Auth callback detected, staying on page');
          // Let the React component handle it
        }
        // Check for error in query
        if (window.location.search && window.location.search.includes('error=')) {
          console.log('Auth error detected');
        }
      })();
    </script>
  </head>

    <div id="root"></div>
    <script type="module" src="/src/main.jsx"></script>
  </body>
